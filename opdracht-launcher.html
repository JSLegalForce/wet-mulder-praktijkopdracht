<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praktijkopdracht – Wet Mulder – JS Legal Force</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Outfit',sans-serif;}
    body{background:#0a0f1e;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
    .bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(45,64,153,0.12) 1px,transparent 1px),linear-gradient(90deg,rgba(45,64,153,0.12) 1px,transparent 1px);background-size:56px 56px;animation:gridMove 25s linear infinite;}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:56px 56px}}
    .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;}
    .orb-1{width:500px;height:500px;background:rgba(26,42,94,0.7);top:-150px;right:-100px;animation:f1 9s ease-in-out infinite;}
    .orb-2{width:380px;height:380px;background:rgba(45,64,153,0.45);bottom:-100px;left:-80px;animation:f2 11s ease-in-out infinite;}
    @keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,40px)}}
    @keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
    .card{position:relative;z-index:10;width:min(460px,92vw);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px 44px;text-align:center;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.6);animation:cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(0.92)}to{opacity:1;transform:translateY(0) scale(1)}}
    .corner{position:absolute;width:18px;height:18px;}
    .tl{top:16px;left:16px;border-top:2px solid rgba(138,154,181,0.5);border-left:2px solid rgba(138,154,181,0.5);border-radius:4px 0 0 0;}
    .tr{top:16px;right:16px;border-top:2px solid rgba(138,154,181,0.5);border-right:2px solid rgba(138,154,181,0.5);border-radius:0 4px 0 0;}
    .bl{bottom:16px;left:16px;border-bottom:2px solid rgba(138,154,181,0.5);border-left:2px solid rgba(138,154,181,0.5);border-radius:0 0 0 4px;}
    .br{bottom:16px;right:16px;border-bottom:2px solid rgba(138,154,181,0.5);border-right:2px solid rgba(138,154,181,0.5);border-radius:0 0 4px 0;}
    .shield-wrap{display:inline-block;margin-bottom:24px;animation:shieldFloat 3.5s ease-in-out infinite;filter:drop-shadow(0 0 28px rgba(45,64,153,0.9));}
    @keyframes shieldFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .ring{position:relative;display:inline-block;}
    .ring::before{content:'';position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(138,154,181,0.25);animation:rp 2.5s ease-in-out infinite;}
    .ring::after{content:'';position:absolute;inset:-24px;border-radius:50%;border:1px solid rgba(138,154,181,0.12);animation:rp 2.5s ease-in-out infinite 0.5s;}
    @keyframes rp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.06)}}
    .brand{font-weight:900;font-size:1.85rem;color:#fff;letter-spacing:-0.02em;margin-bottom:4px;}
    .divider{width:48px;height:2px;background:linear-gradient(90deg,transparent,rgba(138,154,181,0.5),transparent);margin:14px auto;}
    .sub{font-size:0.71rem;color:rgba(138,154,181,0.7);font-weight:600;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;}
    .casus-badge{display:inline-block;background:rgba(45,64,153,0.3);border:1px solid rgba(138,154,181,0.2);border-radius:6px;padding:6px 14px;font-size:0.8rem;color:rgba(255,255,255,0.7);font-weight:600;margin-bottom:32px;}
    .info-rij{display:flex;gap:12px;justify-content:center;margin-bottom:32px;}
    .info-blok{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0;text-align:center;flex:1;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
    .info-getal{font-weight:800;font-size:1.4rem;color:#fff;display:flex;align-items:center;justify-content:center;}
    .info-label{font-size:0.68rem;color:rgba(138,154,181,0.7);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;}
    .btn{position:relative;overflow:hidden;width:100%;background:linear-gradient(135deg,#1a2a5e,#2d4099);color:#fff;border:1px solid rgba(138,154,181,0.25);border-radius:14px;padding:18px 24px;font-family:'Outfit',sans-serif;font-weight:800;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 4px 28px rgba(26,42,94,0.6);transition:transform 0.2s,box-shadow 0.2s;}
    .btn:hover{transform:translateY(-3px);box-shadow:0 10px 44px rgba(45,64,153,0.7);}
    .btn:active{transform:scale(0.98);}
    .btn::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);animation:shimmer 3s ease-in-out infinite 1.5s;}
    @keyframes shimmer{0%{left:-100%}60%,100%{left:150%}}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="shield-wrap"><div class="ring">
      <svg viewBox="0 0 80 93" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:84px;height:98px;display:block;">
        <path d="M40 0L80 18V49C80 71 62 86 40 93C18 86 0 71 0 49V18L40 0Z" fill="rgba(26,42,94,0.8)"/>
        <path d="M40 5L75 21V49C75 69 60 82 40 88C20 82 5 69 5 49V21L40 5Z" fill="rgba(36,53,128,0.9)"/>
        <path d="M40 13L68 26V49C68 65 55 76 40 81C25 76 12 65 12 49V26L40 13Z" fill="#2d4099"/>
        <path d="M40 20L62 30V49C62 62 52 71 40 75C28 71 18 62 18 49V30L40 20Z" fill="#3550b8"/>
        <text x="40" y="59" text-anchor="middle" font-family="Outfit,sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="2">JS</text>
      </svg>
    </div></div>
    <div class="brand">JS Legal Force</div>
    <div class="divider"></div>
    <div class="sub">Praktijkopdracht · Wet Mulder voor BOA's</div>

    <div class="info-rij">
      <div class="info-blok"><span class="info-getal">10</span><span class="info-label">Vragen</span></div>
      <div class="info-blok"><span class="info-getal"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span><span class="info-label">Open vragen</span></div>
      <div class="info-blok"><span class="info-getal"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span class="info-label">Modelantwoord</span></div>
    </div>
    <button class="btn" onclick="window.open('https://jslegalforce.github.io/Wet-mulder-praktijkopdracht/index.html','_blank','width='+screen.width+',height='+screen.height)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
      Open opdracht op groot scherm
    </button>
  </div>
</body>
</html>
